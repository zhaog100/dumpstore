---
# Add or modify a POSIX ACL entry on a dataset mountpoint.
#
# Required extra vars:
#   mountpoint  - absolute path of the dataset mountpoint (e.g. /tank/data)
#   ace         - setfacl entry spec (e.g. "user:alice:rwx", "group:storage:r-x",
#                 "default:user:alice:rwx")
# Optional:
#   recursive   - "true" to apply recursively to all files inside mountpoint (default "false")

- name: Set POSIX ACL entry
  hosts: localhost
  gather_facts: false
  vars:
    recursive: "false"
  tasks:
    - name: Assert required vars
      ansible.builtin.assert:
        that:
          - mountpoint is defined and mountpoint != ""
          - ace is defined and ace != ""
          - mountpoint is not search('[;|&$`]')
          - ace is not search('[;|&$`]')
        fail_msg: "mountpoint and ace are required and must not contain shell-special characters"

    - name: Set POSIX ACL entry (non-recursive)
      ansible.builtin.command:
        argv: ["setfacl", "-m", "{{ ace }}", "{{ mountpoint }}"]
      when: recursive != "true"
      register: acl_result
      changed_when: acl_result.rc == 0

    - name: Set POSIX ACL entry (recursive)
      ansible.builtin.command:
        argv: ["setfacl", "-R", "-m", "{{ ace }}", "{{ mountpoint }}"]
      when: recursive == "true"
      register: acl_result_r
      changed_when: acl_result_r.rc == 0

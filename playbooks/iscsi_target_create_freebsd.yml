---
# Required extra vars:
#   zvol         - ZFS volume name (e.g. tank/vms/win11)
#   iqn          - iSCSI Qualified Name
#   portal_ip    - portal listen IP (default: 0.0.0.0)
#   portal_port  - portal listen port (default: 3260)
#   auth_mode    - "none" or "chap"
#   chap_user    - CHAP username (required when auth_mode=chap)
#   chap_password - CHAP password (required when auth_mode=chap)
#   initiators   - comma-separated initiator IQNs, or "" for allow-all
- name: Create iSCSI target from ZFS volume (FreeBSD/ctld)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate required vars
      ansible.builtin.assert:
        that:
          - zvol is defined and zvol != ""
          - iqn is defined and iqn != ""
          - portal_ip is defined and portal_ip != ""
          - portal_port is defined and portal_port != ""
          - auth_mode is defined and auth_mode in ["none", "chap"]
          - zvol is not search('[;|&$`]')
          - iqn is not search('[;|&$`\s]')
        fail_msg: "Required vars missing or contain invalid characters"

    - name: Check ctld is available
      ansible.builtin.command:
        argv: ["which", "ctld"]
      changed_when: false
      register: _which_ctld
      failed_when: _which_ctld.rc != 0

    - name: Verify zvol device exists
      ansible.builtin.stat:
        path: "/dev/zvol/{{ zvol }}"
      register: _zvol_stat
      failed_when: not _zvol_stat.stat.exists

    - name: Ensure /etc/ctl.conf exists
      ansible.builtin.file:
        path: /etc/ctl.conf
        state: touch
        mode: "0600"
      changed_when: false

    - name: Derive portal-group name for this target
      ansible.builtin.set_fact:
        pg_name: "pg-{{ iqn | replace('.', '-') | replace(':', '-') | truncate(30, true, '') }}"

    - name: Build CHAP line
      ansible.builtin.set_fact:
        chap_line: "{{ '    chap \"' + chap_user + '\" \"' + chap_password + '\"' if auth_mode == 'chap' else '' }}"

    - name: Build initiator lines
      ansible.builtin.set_fact:
        initiator_lines: "{{ initiators.split(',') | select('ne', '') | map('regex_replace', '^(.+)$', '    initiator-name \\1') | join('\n') }}"
      when: initiators is defined and initiators != ""

    - name: Set empty initiator lines when none provided
      ansible.builtin.set_fact:
        initiator_lines: ""
      when: initiators is not defined or initiators == ""

    - name: Add portal-group block to ctl.conf
      ansible.builtin.blockinfile:
        path: /etc/ctl.conf
        marker: "# {mark} DUMPSTORE PORTAL {{ pg_name }}"
        block: |
          portal-group {{ pg_name }} {
              listen {{ portal_ip }}:{{ portal_port }}
          }

    - name: Add target block to ctl.conf
      ansible.builtin.blockinfile:
        path: /etc/ctl.conf
        marker: "# {mark} DUMPSTORE TARGET {{ iqn }}"
        block: |
          target {{ iqn }} {
              portal-group {{ pg_name }}
          {{ chap_line }}
          {{ initiator_lines }}
              lun 0 {
                  path /dev/zvol/{{ zvol }}
              }
          }

    - name: Validate ctl.conf syntax
      ansible.builtin.command:
        argv: ["ctld", "-f", "/etc/ctl.conf", "-t"]
      changed_when: false
      register: _ctld_test
      failed_when: _ctld_test.rc != 0

    - name: Enable and reload ctld
      ansible.builtin.service:
        name: ctld
        enabled: true
        state: reloaded

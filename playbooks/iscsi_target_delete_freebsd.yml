---
# Required extra vars:
#   iqn   - iSCSI Qualified Name of the target to remove
#   zvol  - ZFS volume name (unused by this playbook but required for consistency)
- name: Delete iSCSI target (FreeBSD/ctld)
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Validate required vars
      ansible.builtin.assert:
        that:
          - iqn is defined and iqn != ""
          - iqn is not search('[;|&$`\s]')
        fail_msg: "iqn is required"

    - name: Check ctld is available
      ansible.builtin.command:
        argv: ["which", "ctld"]
      changed_when: false
      register: _which_ctld
      failed_when: _which_ctld.rc != 0

    - name: Derive portal-group name for this target
      ansible.builtin.set_fact:
        pg_name: "pg-{{ iqn | replace('.', '-') | replace(':', '-') | truncate(30, true, '') }}"

    - name: Remove target block from ctl.conf
      ansible.builtin.blockinfile:
        path: /etc/ctl.conf
        marker: "# {mark} DUMPSTORE TARGET {{ iqn }}"
        state: absent

    - name: Remove portal-group block from ctl.conf
      ansible.builtin.blockinfile:
        path: /etc/ctl.conf
        marker: "# {mark} DUMPSTORE PORTAL {{ pg_name }}"
        state: absent

    - name: Validate updated ctl.conf syntax
      ansible.builtin.command:
        argv: ["ctld", "-f", "/etc/ctl.conf", "-t"]
      changed_when: false
      register: _ctld_test
      failed_when: _ctld_test.rc != 0

    - name: Reload ctld
      ansible.builtin.service:
        name: ctld
        state: reloaded

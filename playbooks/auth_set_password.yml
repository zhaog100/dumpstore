---
# auth_set_password.yml — update the admin password hash in the config file.
#
# Required extra vars:
#   config_path   : absolute path to dumpstore.conf (e.g. /etc/dumpstore/dumpstore.conf)
#   password_hash : bcrypt hash string (generated in Go before calling this playbook)
#
# The hash is passed via the PW_HASH environment variable to avoid any
# shell interpretation of the bcrypt '$' characters.
- hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert required vars are defined
      ansible.builtin.assert:
        that:
          - config_path is defined and config_path | length > 0
          - password_hash is defined and password_hash | length > 0
        fail_msg: "config_path and password_hash are required"

    - name: Update password hash in config file
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import json, os
          path = os.environ['CONFIG_PATH']
          with open(path) as f:
              cfg = json.load(f)
          cfg['password_hash'] = os.environ['PW_HASH']
          tmp = path + '.tmp'
          with open(tmp, 'w') as f:
              json.dump(cfg, f, indent=2)
          os.chmod(tmp, 0o600)
          os.rename(tmp, path)
          "
      environment:
        CONFIG_PATH: "{{ config_path }}"
        PW_HASH: "{{ password_hash }}"

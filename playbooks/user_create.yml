---
# Required extra vars:
#   username    - login name for the new user
#   shell       - login shell (e.g. /bin/bash, /sbin/nologin)
# Optional extra vars:
#   uid         - explicit UID (omit for auto-assignment)
#   group       - primary group name (created if it does not exist)
#   groups      - comma-separated supplementary groups
#   password    - pre-hashed password string (e.g. from openssl passwd)
#   create_group - "true" to ensure a group named <username> is created first
#   smb_user    - "true" to also register the user in Samba's tdbsam database
#                 (requires smbpasswd; uses the same plaintext password field)

- name: Create local user
  hosts: localhost
  gather_facts: false
  vars:
    uid: ""
    group: ""
    user_groups: ""
    password: ""
    create_group: "false"
    smb_user: "false"
  tasks:
    - name: Assert required vars
      ansible.builtin.assert:
        that:
          - username is defined and username != ""
          - shell is defined and shell != ""
          - username is not search('[;|&$`]')
        fail_msg: "username and shell are required and must not contain special characters"

    - name: Assert uid is safe if provided
      ansible.builtin.assert:
        that:
          - uid | int >= 1000
        fail_msg: "uid must be >= 1000 (system UIDs are reserved)"
      when: uid != ""

    - name: Create primary group matching username
      ansible.builtin.group:
        name: "{{ username }}"
        state: present
      when: create_group == "true"
      register: _grp1
      retries: 5
      delay: 2
      until: _grp1 is not failed

    - name: Ensure named primary group exists
      ansible.builtin.group:
        name: "{{ group }}"
        state: present
      when: group != ""
      register: _grp2
      retries: 5
      delay: 2
      until: _grp2 is not failed

    - name: Create user
      ansible.builtin.user:
        name: "{{ username }}"
        shell: "{{ shell }}"
        uid: "{{ uid | default(omit) if uid != '' else omit }}"
        group: "{{ group if group != '' else (username if create_group == 'true' else omit) }}"
        groups: "{{ user_groups if user_groups != '' else omit }}"
        password: "{{ password if password != '' else omit }}"
        create_home: true
        state: present
      register: user_result
      retries: 5
      delay: 2
      until: user_result is not failed
      changed_when: user_result.changed

    - name: Register user with Samba smbpasswd
      ansible.builtin.command:
        cmd: "smbpasswd -a -s {{ username | quote }}"
        stdin: "{{ password }}\n{{ password }}\n"
      no_log: true
      changed_when: true
      when: smb_user == "true" and password != ""

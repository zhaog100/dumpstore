---
# Required extra vars:
#   username - login name of the user to modify
#   uid      - current UID of the user (must be >= 1000, validated in Go before calling)
# Optional extra vars:
#   shell        - new login shell
#   primary_group - new primary group name (must already exist)
#   user_groups  - comma-separated supplementary groups (replaces existing; empty = clear all)
#   password     - pre-hashed password string (e.g. from openssl passwd -6); empty = no change

- name: Modify local user
  hosts: localhost
  gather_facts: false
  vars:
    shell: ""
    primary_group: ""
    user_groups: ""
    password: ""
  tasks:
    - name: Assert required vars and safety
      ansible.builtin.assert:
        that:
          - username is defined and username != ""
          - uid is defined
          - uid | int >= 1000
          - username not in ['nobody', 'nfsnobody']
        fail_msg: "username is required, uid must be >= 1000, and protected accounts cannot be modified"

    - name: Modify user
      ansible.builtin.user:
        name: "{{ username }}"
        shell: "{{ shell if shell != '' else omit }}"
        group: "{{ primary_group if primary_group != '' else omit }}"
        groups: "{{ user_groups }}"
        append: false
        password: "{{ password if password != '' else omit }}"
        update_password: always
        state: present
      register: user_result
      retries: 5
      delay: 2
      until: user_result is not failed
      changed_when: user_result.changed
